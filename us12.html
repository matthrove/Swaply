<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US12 · Filtro por universidad — Swaply</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body" data-screen-id="us12">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US12 · Filtro por universidad</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Filtros</h2><div class="right" style="text-decoration:underline">Limpiar</div></div>
          <div class="section-label">Universidad</div>
          <div class="ckline"><span class="ck on">✓</span>PUCP</div>
          <div class="ckline"><span class="ck"></span>UNMSM</div>
          <div class="ckline"><span class="ck"></span>UPC <span class="small" style="margin-left:auto">(tu universidad)</span></div>
          <div class="ckline"><span class="ck"></span>USIL</div>
          <div class="toast warn"><span class="ic">⚠</span><div>No puedes conectarte con tutores de tu misma universidad</div></div>
          <div class="section-label">Habilidad</div>
          <div class="input"><span class="ic">🔍</span>Buscar habilidad…</div>
          <div style="margin-top:auto;padding-bottom:12px"><div class="btn">Aplicar filtros (1)
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
