<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US20 · Notificaciones — Swaply</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body" data-screen-id="us20">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US20 · Notificaciones</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Notificaciones</h2></div>
          <div class="col">
            <div class="notif unread"><div class="ic">📅</div><div><div style="font-size:12px;font-weight:600">Andrea aceptó tu solicitud</div><div class="small">Cálculo · Hoy 10:32</div></div></div>
            <div class="notif unread"><div class="ic">⏰</div><div><div style="font-size:12px;font-weight:600">Sesión en 1 hora</div><div class="small">Física General · 14:00</div></div></div>
            <div class="notif"><div class="ic">★</div><div><div style="font-size:12px;font-weight:600">Carlos te calificó</div><div class="small">★★★★★ · Ayer</div></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
