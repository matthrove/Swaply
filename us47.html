<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US47 · Perfil de tutor público — Swaply</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body" data-screen-id="us47">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <!-- Configuration settings gear button on the far left -->
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US47 · Perfil de tutor público</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          
    <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
    <div class="scr" style="display:flex; flex-direction:column; height:100%;">
      <div class="head"><span class="back">‹</span><h2>Perfil del tutor</h2></div>
      
      <div class="col" style="gap:12px; flex:1; overflow-y:auto; padding-bottom:12px;">
        <div style="text-align:center; padding:16px 0;">
          <div class="av xl" style="margin:0 auto; width:64px; height:64px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700;">AP</div>
          <div style="font-weight:700; font-size:16px; margin-top:8px;" id="tutor-pub-name">Andrea Paredes</div>
          <div class="small" id="tutor-pub-uni">UPC · Ingeniería de Sistemas</div>
          <div style="margin-top:6px; display:flex; justify-content:center; gap:6px;">
            <span class="pill good" id="tutor-pub-badge">Verificado ✓</span>
          </div>
        </div>
        
        <div style="display:flex; gap:8px; justify-content:center;">
          <div class="stat" style="flex:1; text-align:center; padding:8px; border:1px solid var(--soft); border-radius:10px;">
            <div class="n" style="font-size:20px;" id="tutor-pub-rating">4.9</div>
            <div class="l">Rating</div>
          </div>
          <div class="stat" style="flex:1; text-align:center; padding:8px; border:1px solid var(--soft); border-radius:10px;">
            <div class="n" style="font-size:20px;" id="tutor-pub-sessions">47</div>
            <div class="l">Sesiones</div>
          </div>
          <div class="stat" style="flex:1; text-align:center; padding:8px; border:1px solid var(--soft); border-radius:10px;">
            <div class="n" style="font-size:20px;" id="tutor-pub-reviews">32</div>
            <div class="l">Reseñas</div>
          </div>
        </div>
        
        <div class="section-label" style="font-weight:700;">Materias que enseña</div>
        <div class="chips" id="tutor-pub-subjects" style="display:flex; flex-wrap:wrap; gap:6px;">
          <!-- Populated by JS -->
        </div>
        
        <div class="section-label" style="font-weight:700;">Últimas reseñas</div>
        <div class="col" style="gap:8px;" id="tutor-pub-reviews-list">
          <!-- Populated by JS -->
        </div>
      </div>
      
      <div style="margin-top:auto; padding-bottom:12px;">
        <button type="button" class="btn" id="btn-request-tutor" style="width:100%;">Solicitar tutoría</button>
      </div>
    </div>
  
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
