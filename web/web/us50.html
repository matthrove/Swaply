<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US50 · Cambio de contraseña — Swaply</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body" data-screen-id="us50">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <!-- Configuration settings gear button on the far left -->
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US50 · Cambio de contraseña</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Cambiar contraseña</h2></div>
          <div class="form-field mt"><label>Contraseña actual</label><div class="input">••••••••</div></div>
          <div class="form-field"><label>Nueva contraseña</label><div class="input">••••••••••</div></div>
          <div class="form-field"><label>Confirmar nueva</label><div class="input">••••••••••</div></div>
          <div class="section-label">Requisitos</div>
          <div class="col" style="gap:4px">
            <div class="ckline" style="padding:4px 0;border:none"><span class="ck on">✓</span><span class="small">Mínimo 8 caracteres</span></div>
            <div class="ckline" style="padding:4px 0;border:none"><span class="ck on">✓</span><span class="small">Una mayúscula</span></div>
            <div class="ckline" style="padding:4px 0;border:none"><span class="ck on">✓</span><span class="small">Un número</span></div>
            <div class="ckline" style="padding:4px 0;border:none"><span class="ck"></span><span class="small">Un símbolo (opcional)</span></div>
          </div>
          <div class="toast bad mt" style="display:none"><span class="ic">⚠</span><div>La contraseña actual no es correcta</div></div>
          <div style="margin-top:auto;padding-bottom:12px"><div class="btn">Actualizar contraseña
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
