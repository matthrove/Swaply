<!DOCTYPE html>
<html lang="es">
<head>

<body class="app-body" data-screen-id="us48">

      <header class="app-topbar" id="appTopbar">

      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Privacidad</h2></div>
          <div class="section-label">¿Qué se ve en tu perfil?</div>

          <div class="row-line"><div class="l">Mostrar nombre real</div><div class="r"><span style="display:inline-block;width:30px;height:18px;background:var(--primary);border-radius:9px;position:relative"><span style="display:block;width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;right:2px;top:2px"></span></span></div></div>
          <div class="row-line"><div class="l">Mostrar carrera</div><div class="r"><span style="display:inline-block;width:30px;height:18px;background:#d9d7d2;border-radius:9px;position:relative"><span style="display:block;width:14px;height:14px;background:#fff;border-radius:50%;position:absolute;left:2px;top:2px"></span></span></div></div>
          <div class="section-label">Visibilidad general</div>
          <div style="border:2px solid var(--primary);border-radius:12px;padding:10px;background:var(--brand-bg)"><div class="flex"><div style="font-size:20px">🙈</div><div style="flex:1"><div style="font-weight:600;font-size:12px">Perfil privado</div><div class="small">No apareces en búsquedas. Solo tú puedes iniciar contacto.</div></div><span class="ck r"></span></div></div>
          <div class="toast mt"><span class="ic">ℹ</span><div>Los cambios se aplican de inmediato.
        </div>
      </div>
    </div>
  </div>
