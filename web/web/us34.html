<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US34 · Insignia tutor destacado — Swaply</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body" data-screen-id="us34">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <!-- Configuration settings gear button on the far left -->
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US34 · Insignia tutor destacado</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Logros</h2></div>
          <div style="border:2px solid var(--primary);border-radius:18px;padding:14px;text-align:center;background:var(--brand-bg);position:relative">
            <div style="font-size:48px">🏅</div>
            <div style="font-family:'Caveat',cursive;font-size:24px;font-weight:700;line-height:1;color:var(--primary)">¡Tutor Destacado!</div>
            <div class="small" style="margin-top:4px">4.5★ con +10 sesiones completadas</div>
          </div>
          <div class="section-label">Progreso</div>
          <div class="kv"><span class="k">Promedio</span><span class="v">4.8 ★</span></div>
          <div class="kv"><span class="k">Sesiones completadas</span><span class="v">12 / 10</span></div>
          <div class="kv"><span class="k">Estado de insignia</span><span class="v" style="color:#3aa56b">Activa</span></div>
          <div class="toast warn mt"><span class="ic">ℹ</span><div>Si tu promedio cae bajo <b>4.0</b>, la insignia se retira automáticamente.
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
