<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>US50 · Cambiar contraseña — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
  <style>
    .req-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--muted); margin-bottom: 6px;
    }
    .req-ck {
      width: 16px; height: 16px; border-radius: 3px;
      border: 1.5px solid #ccc; background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 10px; transition: all .15s;
    }
    .req-ck.ok { background: var(--primary); border-color: var(--primary); color: #fff; }
    .pass-field { position: relative; }
    .pass-field input { padding-right: 36px; }
    .pass-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; font-size: 16px; color: var(--muted);
    }
  </style>
</head>
<body class="app-body" data-screen-id="us50">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US50 · Cambiar contraseña</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="display:flex; flex-direction:column; height:100%;">
            <div class="head"><span class="back">‹</span><h2>Cambiar contraseña</h2></div>

            <div style="flex:1; display:flex; flex-direction:column; gap:14px; overflow-y:auto; padding-bottom:12px;">

              <!-- Contraseña actual (oculta si viene de recuperación) -->
              <div id="current-pass-block">
                <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px;">Contraseña actual</div>
                <div class="pass-field">
                  <input type="password" id="pass-current" class="input" placeholder="••••••••" style="width:100%; box-sizing:border-box;">
                  <button type="button" class="pass-toggle" data-target="pass-current">👁</button>
                </div>
                <div id="err-current" style="display:none; font-size:11px; color:#d64545; margin-top:3px;">Contraseña incorrecta</div>
              </div>

              <!-- Nueva contraseña -->
              <div>
                <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px;">Nueva contraseña</div>
                <div class="pass-field">
                  <input type="password" id="pass-new" class="input" placeholder="••••••••••" style="width:100%; box-sizing:border-box;">
                  <button type="button" class="pass-toggle" data-target="pass-new">👁</button>
                </div>
              </div>

              <!-- Confirmar nueva -->
              <div>
                <div style="font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px;">Confirmar nueva</div>
                <div class="pass-field">
                  <input type="password" id="pass-confirm" class="input" placeholder="••••••••••" style="width:100%; box-sizing:border-box;">
                  <button type="button" class="pass-toggle" data-target="pass-confirm">👁</button>
                </div>
                <div id="err-match" style="display:none; font-size:11px; color:#d64545; margin-top:3px;">Las contraseñas no coinciden</div>
              </div>

              <!-- Requisitos -->
              <div>
                <div style="font-size:11px; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px;">Requisitos</div>
                <div class="req-row"><div class="req-ck" id="req-len"></div><span>Mínimo 8 caracteres</span></div>
                <div class="req-row"><div class="req-ck" id="req-upper"></div><span>Una mayúscula</span></div>
                <div class="req-row"><div class="req-ck" id="req-num"></div><span>Un número</span></div>
                <div class="req-row"><div class="req-ck" id="req-sym"></div><span>Un símbolo (opcional)</span></div>
              </div>

            </div>

            <div style="padding-bottom:8px;">
              <button type="button" id="btn-update-pass" style="width:100%; background:#C9A227; color:#fff; border:none; border-radius:10px; padding:14px; font-weight:700; font-size:15px; cursor:pointer;">Actualizar contraseña</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
