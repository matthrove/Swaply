<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US08 · Subir foto de perfil — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us08">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US08 · Subir foto de perfil</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="display:flex; flex-direction:column; height:100%;">
            <div class="head"><span class="back">‹</span><h2>Foto de perfil</h2></div>

            <label for="photo-input" style="display:block; border:2px dashed #c9c7c2; border-radius:14px; padding:24px 14px; text-align:center; margin-top:8px; cursor:pointer;">
              <div style="font-size:42px" id="photo-icon">🖼️</div>
              <div style="font-size:11px; font-weight:600; margin-top:6px;">Toca para seleccionar foto</div>
              <div class="small">JPG o PNG · máx. 5 MB</div>
            </label>
            <input type="file" id="photo-input" accept="image/jpeg,image/png" style="display:none;">

            <div id="photo-error" class="toast bad mt" style="display:none;"><span class="ic">⚠</span><div>La imagen no debe superar los <b>5 MB</b></div></div>

            <div class="section-label" style="margin-top:12px;">Vista previa</div>
            <div class="flex" style="align-items:center; gap:12px; margin-top:8px;">
              <div class="av xl" id="photo-preview" style="background:linear-gradient(135deg,#f4d4d8,#8B1A2B); color:#fff; font-weight:700; overflow:hidden; font-size:20px;"></div>
              <div>
                <div style="font-weight:600; font-size:12px;" id="photo-preview-name">Tu nombre</div>
                <div class="small" id="photo-preview-univ">Universidad · Carrera</div>
              </div>
            </div>

            <div style="margin-top:auto; padding-bottom:12px;">
              <button type="button" class="btn" id="btn-save-photo" style="width:100%;">Realizar cambio</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
