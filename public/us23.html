<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US23 · Billetera de créditos — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us23">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US23 · Billetera de créditos</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Mi Billetera</h2></div>
          <div class="balance-card" style="background:var(--primary);color:#fff;border-radius:14px;padding:16px;text-align:center;margin:8px 0">
            <div style="font-size:11px;opacity:0.8">Saldo disponible</div>
            <div style="font-size:28px;font-weight:700">💎 12 créditos</div>
            <div style="font-size:10px;opacity:0.7;margin-top:2px">1 crédito = 1 hora de tutoría</div>
          </div>
          <div class="section-label">Historial</div>
          <div class="col">
            <div class="txn"><div class="ic good">+</div><div class="body"><div>Sesión completada · Carlos M.</div><div class="small">+1 crédito · Ayer</div></div></div>
            <div class="txn"><div class="ic bad">−</div><div class="body"><div>Sesión con Andrea P.</div><div class="small">−1 crédito · Hace 3 días</div></div></div>
            <div class="txn"><div class="ic good">+</div><div class="body"><div>Bono bienvenida</div><div class="small">+5 créditos · Al registrarse</div></div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
