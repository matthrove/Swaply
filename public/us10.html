<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US10 · Perfil público de tutor — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us10">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US10 · Perfil público de tutor</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="display:flex; flex-direction:column; height:100%;">
            <div class="head"><span class="back">‹</span><h2>Perfil de tutor</h2><div class="right" id="tutor-fav" style="cursor:pointer;">★</div></div>

            <div style="flex:1; overflow-y:auto; padding-bottom:12px;">
              <div style="display:flex; flex-direction:column; align-items:center; gap:8px; margin-bottom:16px;">
                <div class="av xl" id="tutor-avatar" style="font-size:26px; font-weight:700; overflow:hidden; color:#fff;"></div>
                <div style="font-weight:700; font-size:17px; color:var(--ink);" id="tutor-name"></div>
                <div style="font-size:12px; color:var(--muted);" id="tutor-meta"></div>
                <div style="display:flex; gap:4px; align-items:center;" id="tutor-stars"></div>
                <span class="tag" id="tutor-badge" style="font-weight:600; font-size:11px;"></span>
              </div>
              <div class="form-field"><label>Sobre mí</label><div style="font-size:13px; color:var(--ink); line-height:1.5;" id="tutor-bio"></div></div>
              <div class="form-field"><label>Materias que enseña</label><div class="chips" style="flex-wrap:wrap; gap:6px; margin-top:4px;" id="tutor-subjects"></div></div>
              <div class="form-field"><label>Disponibilidad</label><div class="chips" style="flex-wrap:wrap; gap:6px; margin-top:4px;" id="tutor-avail"></div><div style="font-size:11px; color:var(--muted); margin-top:6px;" id="tutor-schedule"></div></div>
              <div class="form-field"><label>Costo por sesión</label><div style="font-size:14px; font-weight:700; color:var(--primary);" id="tutor-credits"></div></div>
              <div class="form-field"><label>Reseñas recientes</label><div id="tutor-reviews"></div></div>
            </div>

            <div style="padding-top:8px; padding-bottom:12px;">
              <button type="button" class="btn" id="btn-solicitar-sesion" style="width:100%;">Solicitar sesión</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
