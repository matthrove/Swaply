<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>US36 · Mi billetera — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us36">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">Mi billetera</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="flex-direction:column;height:100%;padding:12px 16px;box-sizing:border-box;display:flex;">
  <div class="head">
    <button type="button" onclick="history.back()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--primary);">&#8592;</button>
    <span style="font-weight:700;font-size:16px;">Mi billetera</span>
    <span id="btn-us36-historial" style="color:var(--primary);font-weight:700;font-size:12px;cursor:pointer;">Mi historial</span>
  </div>

  <!-- Balance card -->
  <div style="position:relative;border:2px dashed var(--primary);border-radius:14px;padding:24px 16px;text-align:center;margin:12px 0;">
    <div style="position:absolute;top:-10px;right:12px;background:var(--cta,#C9A227);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;">+3 hoy!</div>
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;">SALDO ACTUAL</div>
    <div style="font-size:48px;font-weight:800;color:var(--primary);line-height:1;">15</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px;">créditos · Swaply</div>
  </div>

  <div class="section-label" style="margin-top:8px;">CÓMO GANAR</div>
  <div style="border:1px solid var(--soft);border-radius:10px;overflow:hidden;margin-top:6px;">
    <div style="display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--soft);">
      <span style="font-size:20px;">🎓</span>
      <span style="flex:1;font-size:13px;">Completar una sesión</span>
      <span style="color:#27ae60;font-weight:700;font-size:13px;">+3</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:12px;border-bottom:1px solid var(--soft);">
      <span style="font-size:20px;">⭐</span>
      <span style="flex:1;font-size:13px;">Recibir 5★ del aprendiz</span>
      <span style="color:#27ae60;font-weight:700;font-size:13px;">+1</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px;padding:12px;">
      <span style="font-size:20px;">🏆</span>
      <span style="flex:1;font-size:13px;">Insignia destacada</span>
      <span style="color:#27ae60;font-weight:700;font-size:13px;">+5</span>
    </div>
  </div>

  <div style="flex:1;"></div>
  <button type="button" id="btn-ver-historial" style="width:100%;margin-top:auto;padding:14px;border:1.5px solid var(--primary);background:transparent;color:var(--primary);border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;">Ver historial completo</button>
</div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
