<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>US35 · Reportar reseña — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
  <style>
    .report-opt {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--soft); cursor: pointer; font-size: 13px;
    }
    .report-opt:last-child { border-bottom: none; }
    .report-radio {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #ccc; background: #fff; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .report-opt.sel .report-radio { border-color: #d64545; background: #d64545; }
    .report-opt.sel .report-radio::after { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #fff; }
  </style>
</head>
<body class="app-body" data-screen-id="us35">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US35 · Reportar reseña</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="display:flex; flex-direction:column; height:100%;">
            <div class="head"><span class="back">‹</span><h2>Reportar reseña</h2></div>

            <!-- Reseña reportada -->
            <div id="us35-review-card" style="background:var(--brand-bg); border-radius:12px; padding:12px 14px; margin-bottom:16px;">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                <div id="us35-av" style="width:30px;height:30px;border-radius:50%;background:var(--primary);color:#fff;font-weight:700;font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"></div>
                <div>
                  <div style="font-weight:700;font-size:12px;" id="us35-from"></div>
                  <div style="color:var(--cta);font-size:11px;" id="us35-stars"></div>
                </div>
              </div>
              <div style="font-size:12px;color:var(--ink);line-height:1.4;font-style:italic;" id="us35-comment"></div>
            </div>

            <div style="font-size:11px; font-weight:700; color:#d64545; text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px;">Motivo del reporte</div>

            <div id="us35-motivos">
              <div class="report-opt" data-val="Es falsa o inventada">
                <div class="report-radio"></div><span>Es falsa o inventada</span>
              </div>
              <div class="report-opt" data-val="Contiene lenguaje ofensivo">
                <div class="report-radio"></div><span>Contiene lenguaje ofensivo</span>
              </div>
              <div class="report-opt" data-val="No corresponde a una sesión real">
                <div class="report-radio"></div><span>No corresponde a una sesión real</span>
              </div>
              <div class="report-opt" data-val="Información personal expuesta">
                <div class="report-radio"></div><span>Información personal expuesta</span>
              </div>
              <div class="report-opt" data-val="otro">
                <div class="report-radio"></div><span>Otro motivo</span>
              </div>
            </div>

            <div id="us35-otro-wrap" style="display:none; margin-top:10px;">
              <textarea id="us35-otro-text" placeholder="Describe brevemente por qué consideras que esta reseña es inapropiada…" style="width:100%; box-sizing:border-box; height:72px; padding:10px 12px; font-size:13px; border:1.5px solid var(--soft); border-radius:10px; resize:none; font-family:inherit; outline:none;"></textarea>
            </div>

            <div style="flex:1;"></div>

            <div style="padding-bottom:12px;">
              <button type="button" id="btn-us35-enviar" style="width:100%; padding:14px; background:#d64545; color:#fff; border:none; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer;">Enviar reporte</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
