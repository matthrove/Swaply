<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US07 · Editar perfil — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us07">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US07 · Editar perfil</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head" style="display:flex;align-items:center;">
            <span class="back">‹</span>
            <h2 style="flex:1;margin:0;">Editar perfil</h2>
            <button type="button" id="btn-us07-settings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0;color:var(--primary);" aria-label="Configuración">⚙️</button>
          </div>
          <div class="flex" style="justify-content:center;flex-direction:column;text-align:center"><div class="av xl">RE</div><div class="small" style="margin-top:6px;text-decoration:underline;color:var(--primary)">Cambiar foto</div></div>
          <div class="form-field mt"><label>Nombre</label><div class="input-wrap"><input id="edit-name" class="field-search" placeholder="Tu nombre completo"></div></div>
          <div class="form-field"><label>Bio</label><div class="input-wrap"><textarea id="edit-bio" class="field-search" placeholder="Cuéntanos sobre ti…" style="height:60px;resize:none;"></textarea></div></div>
          <div class="form-field"><label>Universidad</label><div class="input-wrap"><input id="edit-univ" class="field-search" placeholder="Ej: UPC"></div></div>
          <div class="form-field"><label>Carrera</label><div class="input-wrap"><input id="edit-career" class="field-search" placeholder="Ej: Ing. Software"></div></div>
          <div id="edit-toast" class="toast mt" style="display:none;"><span class="ic">✓</span><div id="edit-toast-msg">Cambios guardados</div></div>
          <div style="margin-top:auto;padding-bottom:12px; display:flex; flex-direction:column; gap:8px;">
            <button type="button" class="btn" id="btn-save-profile" style="width:100%;">Guardar cambios</button>
            <button type="button" class="btn" id="btn-logout-us07" style="width:100%; background:#d64545;">Cerrar sesión</button>
          </div>

          <!-- Logout confirmation overlay -->
          <div id="logout-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:999; align-items:center; justify-content:center;">
            <div style="background:#fff; border-radius:16px; padding:24px 20px; max-width:260px; width:90%; box-shadow:0 8px 32px rgba(0,0,0,0.18); text-align:center;">
              <div style="font-size:22px; margin-bottom:8px;">🚪</div>
              <div style="font-weight:700; font-size:14px; color:var(--ink); margin-bottom:6px;">¿Cerrar sesión?</div>
              <div style="font-size:12px; color:var(--muted); margin-bottom:16px;">Tu perfil y contraseña se conservarán para cuando vuelvas.</div>
              <div style="display:flex; gap:8px;">
                <button id="logout-overlay-no" type="button" style="flex:1; padding:10px; border:1.5px solid var(--primary); background:transparent; color:var(--primary); border-radius:10px; font-weight:600; font-size:13px; cursor:pointer;">No</button>
                <button id="logout-overlay-si" type="button" style="flex:1; padding:10px; background:#d64545; border:none; color:#fff; border-radius:10px; font-weight:600; font-size:13px; cursor:pointer;">Sí</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
