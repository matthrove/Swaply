<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>US31 · Califica al tutor — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us31">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US31 · Califica al tutor</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          
    <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
    <div class="scr" style="display:flex; flex-direction:column; height:100%;">
      <div class="head"><span class="back">‹</span><h2>¿Cómo estuvo?</h2></div>
      <div style="text-align:center; margin-top:12px;">
        <div style="margin:0 auto; width:64px; height:64px; border-radius:50%; background:#F4E7E9; color:var(--primary); display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:700;">AP</div>
        <div style="font-weight:600; font-size:13px; margin-top:8px;" id="rate-tutor-name">Andrea Paredes</div>
        <div class="small" id="rate-tutor-subj">Cálculo Diferencial · 7 nov</div>
      </div>
      <div class="stars-row" id="rate-stars-container" style="display:flex; justify-content:center; gap:8px; font-size:32px; margin:16px 0; cursor:pointer; color:#ccc;">
        <span class="star" data-value="1">★</span><span class="star" data-value="2">★</span><span class="star" data-value="3">★</span><span class="star" data-value="4">★</span><span class="star" data-value="5">★</span>
      </div>
      <div id="rate-stars-feedback" style="font-weight:600; color:var(--primary); text-align:center; min-height:20px;"></div>
      <div class="form-field" style="margin-top:12px;">
        <label>Reseña (opcional)</label>
        <div class="input-wrap" style="border:1.5px solid #c9c7c2; border-radius:8px; padding:6px;">
          <textarea id="rate-comment" rows="3" style="width:100%; border:none; outline:none; font-family:inherit; font-size:12px; resize:none;" placeholder="Reseña (opcional)"></textarea>
        </div>
      </div>
      <div class="section-label" style="font-weight:700; margin-top:12px; margin-bottom:6px;">Etiquetas rápidas</div>
      <div class="chips" id="rate-tags-container" style="display:flex; flex-wrap:wrap; gap:6px;">
        <span class="chip" data-tag="Paciente" style="cursor:pointer;">Paciente</span>
        <span class="chip" data-tag="Clara" style="cursor:pointer;">Clara</span>
        <span class="chip" data-tag="Puntual" style="cursor:pointer;">Puntual</span>
        <span class="chip" data-tag="Didáctico" style="cursor:pointer;">Didáctico</span>
        <span class="chip" data-tag="Ordenado" style="cursor:pointer;">Ordenado</span>
        <span id="tag-add-btn" style="padding:6px 12px;border:1.5px dashed var(--primary);color:var(--primary);border-radius:999px;font-size:12px;cursor:pointer;font-weight:600;">+ más</span>
      </div>
      <div style="margin-top:auto; padding-top:12px; padding-bottom:12px;">
        <button type="button" class="btn" id="btn-submit-rating" style="width:100%;">Enviar calificación</button>
      </div>
    </div>
  
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
