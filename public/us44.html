<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>US44 · Universidades — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us44">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US44 · Universidades</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="display:flex; flex-direction:column; height:100%;">
            <div class="head"><span class="back">‹</span><h2>Universidades</h2><span id="btn-nueva-univ" style="margin-left:auto; color:var(--primary); font-weight:700; font-size:13px; cursor:pointer;">+ Nueva</span></div>
            <div style="display:flex; align-items:center; gap:6px; background:#f8f4f0; border-radius:10px; padding:8px 12px; margin-bottom:12px;">
              <span>🔍</span><input type="text" placeholder="Buscar universidad..." style="border:none; background:none; font-size:13px; flex:1; outline:none;">
            </div>
            <div style="flex:1; overflow-y:auto;">
              <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--soft);">
                <div><div style="font-weight:700; font-size:13px;">UPC</div><div style="font-size:11px; color:var(--muted);">@upc.edu.pe</div></div>
                <span style="background:#d4edda; color:#155724; border-radius:999px; padding:3px 10px; font-size:11px; font-weight:600;">Activa</span>
              </div>
              <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--soft);">
                <div><div style="font-weight:700; font-size:13px;">PUCP</div><div style="font-size:11px; color:var(--muted);">@pucp.edu.pe</div></div>
                <span style="background:#d4edda; color:#155724; border-radius:999px; padding:3px 10px; font-size:11px; font-weight:600;">Activa</span>
              </div>
              <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--soft);">
                <div><div style="font-weight:700; font-size:13px;">UNMSM</div><div style="font-size:11px; color:var(--muted);">@unmsm.edu.pe</div></div>
                <span style="background:#d4edda; color:#155724; border-radius:999px; padding:3px 10px; font-size:11px; font-weight:600;">Activa</span>
              </div>
              <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--soft);">
                <div><div style="font-weight:700; font-size:13px;">UNI</div><div style="font-size:11px; color:var(--muted);">@uni.edu.pe</div></div>
                <span style="background:#fff3cd; color:#856404; border-radius:999px; padding:3px 10px; font-size:11px; font-weight:600;">Pendiente</span>
              </div>
              <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--soft);">
                <div><div style="font-weight:700; font-size:13px;">USIL</div><div style="font-size:11px; color:var(--muted);">@usil.edu.pe</div></div>
                <span style="background:#f8d7da; color:#721c24; border-radius:999px; padding:3px 10px; font-size:11px; font-weight:600;">Bloqueada</span>
              </div>
            </div>
            <div style="background:#fff3cd; border-radius:10px; padding:10px 12px; margin-top:12px; font-size:11px; color:#856404; line-height:1.5;">
              🏫 Al eliminar una universidad, las cuentas existentes se conservan.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
