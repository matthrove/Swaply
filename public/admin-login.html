<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>Admin · Acceso — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="admin-login">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">Acceso administrador</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="display:flex; flex-direction:column; height:100%;">

            <div style="text-align:center; margin-top:32px; margin-bottom:6px;">
              <div style="font-size:48px;">🛡</div>
              <div style="font-weight:800; font-size:18px; color:var(--primary); margin-top:8px;">Panel de administración</div>
              <div style="font-size:12px; color:var(--muted); margin-top:4px;">Acceso restringido · Swaply</div>
            </div>

            <div class="col" style="gap:10px; margin-top:24px;">
              <div class="form-field">
                <label>Usuario</label>
                <div class="input-wrap"><input type="text" id="admin-user" value="Admin Swaply" readonly style="color:var(--muted);"></div>
              </div>
              <div class="form-field">
                <label>Contraseña</label>
                <div class="input-wrap"><input type="password" id="admin-pass" value="admin" placeholder="Contraseña"></div>
              </div>
              <div id="admin-error" class="toast bad" style="display:none;"><span class="ic">⚠</span><div>Contraseña incorrecta.</div></div>
            </div>

            <div style="margin-top:auto; padding-bottom:12px;">
              <button type="button" id="btn-admin-login" class="btn" style="width:100%;">Entrar al panel</button>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
