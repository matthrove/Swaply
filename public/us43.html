<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>US43 · Reportes — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us43">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">Reportes</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="flex-direction:column;height:100%;padding:12px 16px;box-sizing:border-box;display:flex;">
  <div class="head">
    <button type="button" onclick="history.back()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--primary);">&#8592;</button>
    <span style="font-weight:700;font-size:16px;">Reportes</span>
    <span></span>
  </div>

  <!-- Tab bar -->
  <div style="display:flex;gap:6px;margin:8px 0;">
    <button id="tab-rep-pend" style="flex:1;padding:8px;border-radius:8px;background:var(--primary);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;">Pendientes (5)</button>
    <button id="tab-rep-res" style="flex:1;padding:8px;border-radius:8px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);font-size:12px;font-weight:700;cursor:pointer;">Resueltos</button>
  </div>

  <!-- Report list -->
  <div id="rep-list" style="flex:1;overflow-y:auto;margin-top:4px;">
    <div style="background:#fff;border:1px solid var(--soft);border-radius:10px;padding:12px;margin-bottom:8px;">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <span style="color:#d64545;font-size:16px;">▲</span>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:13px;">Reseña ofensiva</div>
          <div class="small" style="color:var(--ink);">Jorge G. → Andrea P.</div>
          <div class="small" style="color:var(--muted);">hace 1h · reportado por 2 usuarios</div>
        </div>
      </div>
    </div>
    <div style="background:#fff;border:1px solid var(--soft);border-radius:10px;padding:12px;margin-bottom:8px;">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <span style="color:#d64545;font-size:16px;">▲</span>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:13px;">Suplantación</div>
          <div class="small" style="color:var(--ink);">Cuenta "tutor_top_perú"</div>
          <div class="small" style="color:var(--muted);">hace 6h</div>
        </div>
      </div>
    </div>
    <div style="background:#fff;border:1px solid var(--soft);border-radius:10px;padding:12px;margin-bottom:8px;">
      <div style="display:flex;align-items:flex-start;gap:8px;">
        <span style="color:#d64545;font-size:16px;">▲</span>
        <div style="flex:1;">
          <div style="font-weight:700;font-size:13px;">No asistió a una sesión</div>
          <div class="small" style="color:var(--ink);">Reportado por Karen R.</div>
          <div class="small" style="color:var(--muted);">ayer</div>
        </div>
      </div>
    </div>
  </div>

  <div class="section-label" style="margin-top:16px;">ACCIONES DISPONIBLES</div>
  <div style="display:inline-flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
    <button id="btn-rep-eliminar" class="chip" style="padding:7px 14px;border-radius:999px;background:#f8d7da;color:#721c24;border:none;font-size:12px;font-weight:600;cursor:pointer;">Eliminar contenido</button>
    <button id="btn-rep-suspender" class="chip" style="padding:7px 14px;border-radius:999px;background:#fff3cd;color:#856404;border:none;font-size:12px;font-weight:600;cursor:pointer;">Suspender</button>
    <button id="btn-rep-desestimar" class="chip" style="padding:7px 14px;border-radius:999px;background:#e8e8e8;color:#555;border:none;font-size:12px;font-weight:600;cursor:pointer;">Desestimar</button>
  </div>
</div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
