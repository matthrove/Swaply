<!DOCTYPE html>
<html lang="es">
<head>

  <title>US43 · Reportes — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">

<body class="app-body" data-screen-id="us43">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>

            <div id="rep-list" style="flex:1; overflow-y:auto;">

                  <span style="color:#d64545; font-size:16px; flex-shrink:0;">▲</span>

                </div>
              </div>
              <div style="background:#fff; border:1px solid var(--soft); border-radius:10px; padding:12px; margin-bottom:8px; cursor:pointer;">
                <div style="display:flex; align-items:flex-start; gap:10px;">
                  <span style="color:#d64545; font-size:16px; flex-shrink:0;">▲</span>
                  <div><div style="font-weight:700; font-size:13px;">Suplantación</div><div style="font-size:12px; color:var(--muted); margin-top:2px;">Cuenta "tutor_top_perú"</div><div style="font-size:11px; color:var(--muted);">hace 6h</div></div>
                </div>
              </div>
              <div style="background:#fff; border:1px solid var(--soft); border-radius:10px; padding:12px; margin-bottom:8px; cursor:pointer;">
                <div style="display:flex; align-items:flex-start; gap:10px;">
                  <span style="color:#d64545; font-size:16px; flex-shrink:0;">▲</span>
                  <div><div style="font-weight:700; font-size:13px;">No asistió a una sesión</div><div style="font-size:12px; color:var(--muted); margin-top:2px;">Reportado por Karen R.</div><div style="font-size:11px; color:var(--muted);">ayer</div></div>
                </div>
              </div>
            </div>
            <div style="border-top:1px solid var(--soft); padding-top:12px; padding-bottom:8px;">
              <div style="font-size:10px; font-weight:700; color:var(--primary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Acciones disponibles</div>
              <div style="display:flex; flex-wrap:wrap; gap:8px;">
                <button id="btn-rep-eliminar" type="button" style="padding:8px 14px; border:1.5px solid #d64545; color:#d64545; background:transparent; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer;">Eliminar contenido</button>
                <button id="btn-rep-suspender" type="button" style="padding:8px 14px; border:1.5px solid var(--primary); color:var(--primary); background:transparent; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer;">Suspender</button>
                <button id="btn-rep-desestimar" type="button" style="padding:8px 14px; border:1.5px solid var(--muted); color:var(--muted); background:transparent; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer;">Desestimar</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
