<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US16 · Enviar solicitud — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us16">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US16 · Enviar solicitud</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="display:flex; flex-direction:column; height:100%;">
            <div class="head"><span class="back">‹</span><h2>Nueva solicitud</h2></div>

            <!-- Tutor info (populated by JS) -->
            <div style="display:flex; align-items:center; gap:12px; background:var(--brand-bg); border-radius:12px; padding:12px; margin-bottom:12px;">
              <div class="av lg" id="sol-avatar" style="color:#fff; font-weight:700; flex-shrink:0;"></div>
              <div>
                <div style="font-weight:700; font-size:13px;" id="sol-name">Tutor</div>
                <div class="small" id="sol-meta">Universidad · Materia</div>
                <div style="font-size:11px; color:var(--primary); font-weight:600; margin-top:2px;" id="sol-credits"></div>
              </div>
            </div>

            <div class="form-field">
              <label>Materia a solicitar</label>
              <div class="input-wrap">
                <select id="sol-subject" class="field-select"></select>
              </div>
            </div>

            <div class="form-field">
              <label>Mensaje para el tutor</label>
              <div class="input-wrap">
                <textarea id="sol-message" class="field-search" placeholder="Ej: Hola, necesito ayuda con integrales para mi examen del viernes…" style="height:80px; resize:none;"></textarea>
              </div>
            </div>

            <div class="form-field">
              <label>Disponibilidad preferida</label>
              <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:4px;">
                <span class="chip" id="sol-chip-m" style="cursor:pointer;">🌅 Mañana</span>
                <span class="chip" id="sol-chip-t" style="cursor:pointer;">☀️ Tarde</span>
                <span class="chip" id="sol-chip-n" style="cursor:pointer;">🌙 Noche</span>
              </div>
            </div>

            <div id="sol-toast" class="toast mt" style="display:none;"><span class="ic">✓</span><div>¡Solicitud enviada! El tutor te responderá pronto.</div></div>

            <div style="margin-top:auto; padding-bottom:12px;">
              <button type="button" class="btn" id="btn-send-solicitud" style="width:100%;">Enviar solicitud</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
