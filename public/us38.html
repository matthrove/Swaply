<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>US38 · Movimientos — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us38">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">Movimientos</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="flex-direction:column;height:100%;padding:12px 16px;box-sizing:border-box;display:flex;">
  <div class="head">
    <button type="button" onclick="history.back()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--primary);">&#8592;</button>
    <span style="font-weight:700;font-size:16px;">Movimientos</span>
    <span></span>
  </div>

  <!-- Tab bar -->
  <div style="display:flex;gap:6px;margin:8px 0;">
    <button id="tab-mov-todos" style="flex:1;padding:7px;border-radius:8px;background:var(--primary);color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;">Todos</button>
    <button id="tab-mov-ganados" style="flex:1;padding:7px;border-radius:8px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);font-size:12px;font-weight:700;cursor:pointer;">Ganados</button>
    <button id="tab-mov-gastados" style="flex:1;padding:7px;border-radius:8px;background:#fff;color:var(--primary);border:1.5px solid var(--primary);font-size:12px;font-weight:700;cursor:pointer;">Gastados</button>
  </div>

  <!-- Transaction list -->
  <div id="mov-list" style="flex:1;overflow-y:auto;">
    <!-- Row 1 -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--soft);">
      <div style="width:36px;height:36px;border-radius:50%;background:#d4edda;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">↑</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;">Sesión con Luis M.</div>
        <div class="small" style="color:var(--muted);">7 nov · enseñé</div>
      </div>
      <span style="color:#27ae60;font-weight:700;font-size:14px;">+3</span>
    </div>
    <!-- Row 2 -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--soft);">
      <div style="width:36px;height:36px;border-radius:50%;background:#f8d7da;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;color:#721c24;">↓</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;">Solicitud Andrea P.</div>
        <div class="small" style="color:var(--muted);">5 nov · aprendí</div>
      </div>
      <span style="color:#d64545;font-weight:700;font-size:14px;">−3</span>
    </div>
    <!-- Row 3 -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--soft);">
      <div style="width:36px;height:36px;border-radius:50%;background:#d4edda;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">↑</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;">5★ de Carlos M.</div>
        <div class="small" style="color:var(--muted);">2 nov · bonus</div>
      </div>
      <span style="color:#27ae60;font-weight:700;font-size:14px;">+1</span>
    </div>
    <!-- Row 4 -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--soft);">
      <div style="width:36px;height:36px;border-radius:50%;background:#d4edda;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">↑</div>
      <div style="flex:1;">
        <div style="font-weight:600;font-size:13px;">Insignia destacada</div>
        <div class="small" style="color:var(--muted);">1 nov · logro</div>
      </div>
      <span style="color:#27ae60;font-weight:700;font-size:14px;">+5</span>
    </div>
  </div>

  <!-- Bottom balance bar -->
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--soft);">
    <span style="font-size:13px;color:var(--muted);">Saldo</span>
    <span style="font-weight:700;font-size:16px;color:var(--primary);">15</span>
  </div>
</div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
