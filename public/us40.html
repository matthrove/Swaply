<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <title>US40 · Notificaciones — Swaply</title>
  <link rel="stylesheet" href="assets/styles/app.css">
</head>
<body class="app-body" data-screen-id="us40">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" id="btnSettings" style="background:none;border:none;font-size:20px;cursor:pointer;padding:0 8px;color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">Notificaciones</span>
        <button type="button" class="hu-toggle" id="huToggle">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
          <div class="scr" style="flex-direction:column;height:100%;padding:12px 16px;box-sizing:border-box;display:flex;">
  <div class="head"><span class="back">‹</span><h2>Notificaciones</h2></div>

  <div class="section-label" style="margin-top:8px;">TIPOS</div>
  <style>
    .sw{position:relative;display:inline-block;width:40px;height:22px;}
    .sw input{opacity:0;width:0;height:0;}
    .sl{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:22px;transition:.3s;}
    .sl:before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
    .sw input:checked+.sl{background:var(--primary);}
    .sw input:checked+.sl:before{transform:translateX(18px);}
  </style>

  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--soft);">
    <span style="font-size:13px;">Nuevas solicitudes</span>
    <label class="sw"><input type="checkbox" checked><span class="sl"></span></label>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--soft);">
    <span style="font-size:13px;">Mensajes nuevos</span>
    <label class="sw"><input type="checkbox"><span class="sl"></span></label>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--soft);">
    <span style="font-size:13px;">Recordatorios de sesión</span>
    <label class="sw"><input type="checkbox" checked><span class="sl"></span></label>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--soft);">
    <span style="font-size:13px;">Nuevas reseñas</span>
    <label class="sw"><input type="checkbox" checked><span class="sl"></span></label>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--soft);">
    <span style="font-size:13px;">Novedades de Swaply</span>
    <label class="sw"><input type="checkbox"><span class="sl"></span></label>
  </div>

  <div class="section-label" style="margin-top:16px;">CANAL</div>
  <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--soft);">
    <input type="checkbox" checked style="width:16px;height:16px;accent-color:var(--primary);">
    <span style="font-size:13px;">App</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--soft);">
    <input type="checkbox" checked style="width:16px;height:16px;accent-color:var(--primary);">
    <span style="font-size:13px;">Correo institucional</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--soft);">
    <input type="checkbox" style="width:16px;height:16px;accent-color:var(--primary);">
    <span style="font-size:13px;">SMS</span>
  </div>

  <div style="flex:1;"></div>
  <button type="button" id="btn-save-notif" style="width:100%;padding:14px;background:var(--cta,#C9A227);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;margin-top:12px;">Guardar preferencias</button>
</div>
        </div>
      </div>
    </div>
  </div>
  <script src="assets/js/screens-data.js"></script>
  <script src="assets/js/app-meta.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
