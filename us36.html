<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US36 · Créditos por enseñar — Swaply</title>

    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <!-- Configuration settings gear button on the far left -->
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>

      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Mi billetera</h2></div>
          <div style="border:2px solid var(--primary);border-radius:18px;padding:14px;text-align:center;background:var(--brand-bg);position:relative">
            <div class="small" style="text-transform:uppercase;letter-spacing:.1em">Saldo actual</div>
            <div style="font-family:'Caveat',cursive;font-size:54px;font-weight:700;line-height:1;color:var(--primary)">15</div>
            <div class="small">créditos · Swaply</div>
            <div class="note-sticky">+3 hoy!</div>
          </div>
          <div class="section-label">Cómo ganar</div>
          <div class="row-line"><div class="l">📚 Completar una sesión</div><div class="r"><b>+3</b></div></div>

          <div class="row-line"><div class="l">🏖 Insignia destacada</div><div class="r"><b>+5</b></div></div>
          <div style="margin-top:auto;padding-bottom:12px"><div class="btn ghost">Ver historial completo
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
