<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US24 · Insignias de logros — Swaply</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body" data-screen-id="us24">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US24 · Insignias de logros</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Mis insignias</h2></div>
          <div class="small">Gana insignias completando sesiones y logrando hitos.</div>
          <div class="badges-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px">
            <div class="badge earned" style="text-align:center;border:1.5px solid var(--primary);border-radius:12px;padding:10px"><div style="font-size:28px">🏅</div><div style="font-size:10px;font-weight:600;margin-top:4px">Primera sesión</div></div>
            <div class="badge earned" style="text-align:center;border:1.5px solid var(--primary);border-radius:12px;padding:10px"><div style="font-size:28px">⭐</div><div style="font-size:10px;font-weight:600;margin-top:4px">5 estrellas</div></div>
            <div class="badge" style="text-align:center;border:1.5px solid #c9c7c2;border-radius:12px;padding:10px;opacity:0.4"><div style="font-size:28px">🔥</div><div style="font-size:10px;font-weight:600;margin-top:4px">5 sesiones</div></div>
            <div class="badge" style="text-align:center;border:1.5px solid #c9c7c2;border-radius:12px;padding:10px;opacity:0.4"><div style="font-size:28px">💎</div><div style="font-size:10px;font-weight:600;margin-top:4px">10 créditos</div></div>
            <div class="badge" style="text-align:center;border:1.5px solid #c9c7c2;border-radius:12px;padding:10px;opacity:0.4"><div style="font-size:28px">🎓</div><div style="font-size:10px;font-weight:600;margin-top:4px">Tutor top</div></div>
            <div class="badge" style="text-align:center;border:1.5px solid #c9c7c2;border-radius:12px;padding:10px;opacity:0.4"><div style="font-size:28px">🤝</div><div style="font-size:10px;font-weight:600;margin-top:4px">Colaborador</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
