<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US45 · Bienvenida — Swaply</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body" data-screen-id="us45">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <!-- Configuration settings gear button on the far left -->
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US45 · Bienvenida</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          
    <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
    <div class="scr" style="display:flex; flex-direction:column; height:100%; justify-content:center; align-items:center; text-align:center;">
      <div style="font-size:48px; margin-bottom:12px;">🎓</div>
      <div style="font-family:'Caveat',cursive; font-size:32px; font-weight:700; color:var(--primary); margin-bottom:8px;">¡Bienvenido a Swaply!</div>
      <div class="small" style="max-width:220px; margin-bottom:24px;">La plataforma donde los estudiantes se ayudan entre sí.</div>
      <button type="button" class="btn" id="btn-start" style="width:80%;">Comenzar</button>
      <div class="small" style="margin-top:12px;">¿Ya tienes cuenta? <span style="color:var(--primary); cursor:pointer;">Inicia sesión</span></div>
    </div>
  
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
