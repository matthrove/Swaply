<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#8B1A2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>US44 · Gestión de universidades — Swaply</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body class="app-body" data-screen-id="us44">
  <div class="app-shell">
    <aside id="appSidebar" class="app-sidebar" aria-label="Historias de usuario"></aside>
    <div class="app-main">
      <header class="app-topbar" id="appTopbar">
        <!-- Configuration settings gear button on the far left -->
        <button type="button" class="btn-settings" id="btnSettings" aria-label="Ajustes" style="background:none; border:none; font-size:20px; cursor:pointer; padding:0 8px; color:var(--primary);">⚙️</button>
        <span class="app-topbar-title" id="screenTitle">US44 · Gestión de universidades</span>
        <button type="button" class="hu-toggle" id="huToggle" aria-label="Ver historias de usuario">50 HU</button>
      </header>
      <div class="app-viewport">
        <div class="app-frame" id="appFrame" role="main" aria-live="polite">
          <div class="bar"><span>12:30</span><span class="icons">▲▼ ⋯⋯⋯</span></div>
        <div class="scr">
          <div class="head"><span class="back">‹</span><h2>Universidades</h2><div class="right">+ Nueva</div></div>
          <div class="input"><span class="ic">🔍</span>Buscar universidad…</div>
          <div class="col mt">
            <div class="row-line"><div class="l"><b>UPC</b> <span class="small">@upc.edu.pe</span></div><div class="r"><span class="pill good">Activa</span></div></div>
            <div class="row-line"><div class="l"><b>PUCP</b> <span class="small">@pucp.edu.pe</span></div><div class="r"><span class="pill good">Activa</span></div></div>
            <div class="row-line"><div class="l"><b>UNMSM</b> <span class="small">@unmsm.edu.pe</span></div><div class="r"><span class="pill good">Activa</span></div></div>
            <div class="row-line"><div class="l"><b>UNI</b> <span class="small">@uni.edu.pe</span></div><div class="r"><span class="pill warn">Pendiente</span></div></div>
            <div class="row-line"><div class="l"><b>USIL</b> <span class="small">@usil.edu.pe</span></div><div class="r"><span class="pill bad">Bloqueada</span>
        </div>
      </div>
    </div>
  </div>
  <script src="js/screens-data.js"></script>
  <script src="js/app-meta.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
